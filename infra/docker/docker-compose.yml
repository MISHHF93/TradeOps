name: tradeops

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradeops
      POSTGRES_PASSWORD: tradeops
      POSTGRES_DB: tradeops
    ports:
      - '5432:5432'
    volumes:
      - tradeops_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tradeops -d tradeops']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - tradeops_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tradeops_pg:
  tradeops_redis:
